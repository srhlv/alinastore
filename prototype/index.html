<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>alina — Gallery</title>
    <link rel="stylesheet" href="./styles.css">
</head>
<body>

<!-- Header -->
<header class="header">
     <a href="index.html" class="header-left">
         <img src="https://prfbmhfnsjmfwfewebob.supabase.co/storage/v1/object/public/prototype/alina-logo.jpg" alt="ALINA Levandovska ART logo" class="header-logo-img">
         <span class="header-title-text">ALINA Levandovska ART</span>
     </a>
     <nav class="header-nav">
         <a href="index.html" class="active">Головна</a>
         <a href="about.html">Про мене</a>
         <a href="contact.html">Контакти</a>
         <a id="cart-badge" href="cart.html">Кошик (0)</a>

</header>

<!-- Gallery -->
<section class="gallery-section">
     <div class="gallery-title">Каталог робіт</div>
     <div class="gallery-grid">

         <!-- Card 1 - couple-1.jpg -->
         <a href="product.html?id=1" class="gallery-card">

             <div class="gallery-card-info">
                 <div class="gallery-card-name">Морський пейзаж</div>
                 <div class="gallery-card-price">від 2 500 ₴</div>
             </div>
         </a>

         <!-- Card 2 - couple-1.jpg (second piece) -->
         <a href="product.html?id=2" class="gallery-card">
             <img src="https://prfbmhfnsjmfwfewebob.supabase.co/storage/v1/object/public/prototype/couple-1.jpg" alt="Весняний сад" class="gallery-card-img">
             <div class="gallery-card-info">
                 <div class="gallery-card-name">Весняний сад</div>
                 <div class="gallery-card-price">від 3 000 ₴</div>
             </div>
         </a>

         <!-- Card 3 - couple-2.jpg -->
         <a href="product.html?id=3" class="gallery-card">
             <img src="https://prfbmhfnsjmfwfewebob.supabase.co/storage/v1/object/public/prototype/couple-2.jpg" alt="Тиша вранці" class="gallery-card-img">

             </div>
         </a>

         <!-- Card 4 - couple-2.jpg (second piece) -->
         <a href="product.html?id=4" class="gallery-card">
             <img src="https://prfbmhfnsjmfwfewebob.supabase.co/storage/v1/object/public/prototype/couple-2.jpg" alt="Геометрія спокою" class="gallery-card-img">
             <div class="gallery-card-info">
                 <div class="gallery-card-name">Геометрія спокою</div>
                 <div class="gallery-card-price">від 2 800 ₴</div>
             </div>
         </a>

     </div>
</section>

<!-- Footer -->
<footer class="footer">
    © 2026 alina art studio
</footer>

<script>
// Simple cart badge from localStorage
(function() {
    const cart = JSON.parse(localStorage.getItem('cart') || '[]');
    document.getElementById('cart-badge').textContent = `Кошик (${cart.length})`;
})();
</script>

</body>
</html>
