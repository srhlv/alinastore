<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALINA Levandovska ART — Кошик</title>
    <link rel="stylesheet" href="./styles.css">
</head>
<body>

<!-- Header -->
<header class="header">
    <a href="index.html" class="header-left">
        <img src="https://prfbmhfnsjmfwfewebob.supabase.co/storage/v1/object/public/prototype/alina-logo.jpg" alt="ALINA Levandovska ART logo" class="header-logo-img">
        <span class="header-title-text">ALINA Levandovska ART</span>
    </a>
    <nav class="header-nav">
        <a href="index.html">Головна</a>
        <a href="about.html">Про мене</a>
        <a href="contact.html">Контакти</a>
        <a id="cart-badge" href="cart.html" class="active">Кошик (0)</a>
    </nav>
</header>

<!-- Cart -->
<section class="page-section">
    <div class="page-title">Кошик</div>

    <div id="cart-empty" class="cart-empty" hidden>
        <p>Ваш кошик порожній.</p>
        <a href="index.html" class="btn-secondary">Перейти до каталогу</a>
    </div>

    <div id="cart-content" hidden>
        <div class="cart-list" id="cart-list"></div>

        <div class="cart-summary">
            <div class="cart-total-row">
                <span>Разом</span>
                <span id="cart-total">0 ₴</span>
            </div>
            <button class="btn-add-cart" onclick="alert('Оформлення замовлення — наступний крок прототипу.')">
                Оформити замовлення
            </button>
        </div>
    </div>
</section>

<!-- Footer -->
<footer class="footer">
    © 2026 alina art studio
</footer>

<script>
function formatPrice(price) {
    return new Intl.NumberFormat('uk-UA').format(price) + ' ₴';
}

function getCart() {
    return JSON.parse(localStorage.getItem('cart') || '[]');
}

function saveCart(cart) {
    localStorage.setItem('cart', JSON.stringify(cart));
}

function updateBadge() {
    const cart = getCart();
    document.getElementById('cart-badge').textContent = `Кошик (${cart.length})`;
}

function removeItem(index) {
    const cart = getCart();
    cart.splice(index, 1);
    saveCart(cart);
    renderCart();
}

function renderCart() {
    const cart = getCart();
    const emptyEl = document.getElementById('cart-empty');
    const contentEl = document.getElementById('cart-content');
    const listEl = document.getElementById('cart-list');
    const totalEl = document.getElementById('cart-total');

    updateBadge();

    if (cart.length === 0) {
        emptyEl.hidden = false;
        contentEl.hidden = true;
        return;
    }

    emptyEl.hidden = true;
    contentEl.hidden = false;

    let total = 0;
    listEl.innerHTML = cart.map((item, index) => {
        total += item.price;
        return `
            <article class="cart-item">
                <img src="${item.image}" alt="${item.title}" class="cart-item-img">
                <div class="cart-item-info">
                    <div class="cart-item-title">${item.title}</div>
                    <div class="cart-item-option">${item.optionName}</div>
                    <div class="cart-item-price">${formatPrice(item.price)}</div>
                </div>
                <button class="cart-item-remove" type="button" onclick="removeItem(${index})" aria-label="Видалити">
                    &times;
                </button>
            </article>
        `;
    }).join('');

    totalEl.textContent = formatPrice(total);
}

renderCart();
</script>

</body>
</html>
